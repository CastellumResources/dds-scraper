name: Run DDS Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # runs every hour

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout scraper repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python multi_site_scraper.py

      - name: Set up SSH for pushing to DDS-Site-Repo
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone DDS-Site-Repo
        run: |
          git clone git@github.com:CastellumResources/DDS-Site-Repo.git site-repo

      - name: Copy headlines.json into DDS-Site-Repo
        run: cp headlines.json site-repo/headlines.json

      - name: Commit and push changes
        run: |
          cd site-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add headlines.json
          git commit -m "Automated update from scraper" || echo "No changes to commit"
          git push



