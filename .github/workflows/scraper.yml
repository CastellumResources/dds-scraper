name: Run DDS Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # every hour

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout scraper repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run scraper
      run: python multi_site_scraper.py

    - name: Commit JSON to scraper repo
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add headlines.json || true
        git commit -m "Scraper update" || echo "No changes to commit"
        git push origin main

    - name: Push JSON to DDS Site Repo
      env:
        TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        # Clone the DDS Site Repo using the PAT
        git clone https://$TOKEN@github.com/CastellumResources/DDS-Site-Repo.git site

        # Copy the new JSON into the site repo
        cp headlines.json site/headlines.json

        cd site
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add headlines.json
        git commit -m "Automated update from scraper" || echo "No changes"
        git push


